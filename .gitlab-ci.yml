image: "dothanhtrung/bevy-dev:latest"

before_script:
  - rm -f .cargo/config.toml
  - rm -f rust-toolchain.toml

cache: &global_cache
  key: cargo_cache
  paths:
    - target/
    - .cargo/registry/index
    - .cargo/registry/cache
  policy: pull-push

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

#check:
#  stage: build
#  script:
#    - rustc --version && cargo --version  # Print version info for debugging
#    - cargo check --examples
#    - cargo check --features=experimental --examples
#  cache:
#    <<: *global_cache
#    policy: pull

test:
  stage: test
  script:
    - cargo check --examples
    - cargo check --examples --features=collider_2d
    - cargo check --examples --features=collider_3d
    - /usr/local/cargo/bin/cargo-sweep sweep -t 60 || true
  rules:
    - changes:
      - Cargo.toml
      - src/**/*
      - examples/**/*
      - tests/**/*

